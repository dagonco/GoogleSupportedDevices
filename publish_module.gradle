mavenPublishing {
    publishToMavenCentral(true)
    signAllPublications()

    coordinates("io.github.dagonco", "gsd", System.getenv("VERSION_NAME"))

    pom {
        name = "Google Supported Devices"
        description = "A library for Android to get the market name of the device."
        url = "https://github.com/dagonco/GoogleSupportedDevices"
        licenses {
            license {
                name = "The Apache License, Version 2.0"
                url = "http://www.apache.org/licenses/LICENSE-2.0.txt"
            }
        }
        developers {
            developer {
                id = "dagonco"
                name = "David González"
                email = "dagonco.dev@gmail.com"
            }
        }
        scm {
            url = "https://github.com/dagonco/GoogleSupportedDevices"
            connection = "scm:git:git://github.com/dagonco/GoogleSupportedDevices.git"
            developerConnection = "scm:git:ssh://git@github.com/dagonco/GoogleSupportedDevices.git"
        }
    }
}
